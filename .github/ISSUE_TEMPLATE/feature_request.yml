name: Feature request
description: Suggest an idea to improve CKSP
title: "[FEATURE] "
labels: ["enhancement"]
projects: ["CKSP"]
assignees: mathiasvatter
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest an improvement!
        Please describe the idea as clearly as possible.

  - type: textarea
    id: feature_description
    attributes:
      label: Feature Description
      description: Describe the feature and what it should achieve.
      placeholder: What would you like to see added or improved?
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem it Solves
      description: Explain the problem, limitation, or workflow issue this feature would address.
      placeholder: What problem are you running into today?
    validations:
      required: true
