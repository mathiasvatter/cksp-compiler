name: Build and Deploy CKSP Compiler

on:
  push:
    # tags:
    #   - 'v*' # Trigger nur bei neuen Tags, z. B. v1.0.0
    branches:
      - master # Trigger bei Push auf main-Branch

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v1
        with:
          cmake-version: '3.27.0'

      - name: Install dependencies
        run: brew install ninja

      - name: Build CKSP (macOS)
        run: |
          chmod +x build_script.sh
          ./build_script.sh

      - name: Extract version directory (macOS)
        id: extract-version-macos
        run: |
            chmod +x scripts/extract_version_dir.sh
            VERSION_DIR=$(./scripts/extract_version_dir.sh)
            echo "VERSION_DIR=$VERSION_DIR" >> $GITHUB_ENV
            echo "Detected VERSION_DIR: $VERSION_DIR"
            ls _Releases/

      - name: Extract version and set tag
        id: extract-tag-macos
        run: |
            VERSION=$(cmake-build-release/cksp --version | awk '{print $3}')
            TAG="v${VERSION}"
            echo "TAG=$TAG" >> $GITHUB_ENV
            echo "Detected TAG: $TAG"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v3
        with:
          name: macos-build
          path: _Releases/${{ env.VERSION_DIR }} # Release-Dateien für macOS hochladen

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: choco install cmake ninja

      - name: Build CKSP (Windows)
        run: |
            cmd /c build_script.bat

      - name: Extract version directory (Windows)
        id: extract-version-windows
        shell: cmd
        run: |
            for /f "delims=" %%a in ('call scripts\extract_version_dir.bat') do echo VERSION_DIR=%%a >> %GITHUB_ENV%
            
            rem Ausgabe der extrahierten VERSION_DIR
            echo Extracted VERSION_DIR:
            for /f "delims=" %%a in ('call scripts\extract_version_dir.bat') do echo %%a
            
            rem Anzeigen des Inhalts des _Releases-Ordners
            echo Current _Releases folder content:
            dir _Releases /s
    

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v3
        with:
          name: windows-build
          path: _Releases/${{ env.VERSION_DIR }} # Release-Dateien für Windows hochladen

  deploy:
    runs-on: ubuntu-latest
    needs: [build-macos, build-windows]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Download macOS artifact
        uses: actions/download-artifact@v3
        with:
          name: macos-build
          path: macos-release/

      - name: Download Windows artifact
        uses: actions/download-artifact@v3
        with:
          name: windows-build
          path: windows-release/
  

      - name: Merge artifacts into _Releases
        if: ${{ env.VERSION_DIR && env.VERSION_DIR != '' }}
        run: |
            # Sicherstellen, dass der Zielordner existiert
            mkdir -p _Releases/${{ env.VERSION_DIR }}
            
            # Dateien aus macos-release/ kopieren (falls Ziel noch leer ist)
            rsync -a --update macos-release/${{ env.VERSION_DIR }}/ _Releases/${{ env.VERSION_DIR }}/
            
            # Dateien aus windows-release/ kopieren, bevorzugt neuere Dateien
            rsync -a --update windows-release/${{ env.VERSION_DIR }}/ _Releases/${{ env.VERSION_DIR }}/

      - name: Push merged _Releases to master
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
            git config user.name "GitHub Actions"
            git config user.email "actions@github.com"
            git add *
            git commit -m "Merge artifacts for version ${{ env.VERSION_DIR }}"
            git push origin master

      - name: Create and push Git tag
        if: ${{ env.TAG && env.TAG != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          # Entferne bestehenden Tag, falls vorhanden
          if git rev-parse "${{ env.TAG }}" >/dev/null 2>&1; then
              git tag -d "${{ env.TAG }}"
              git push origin --delete "${{ env.TAG }}"
          fi

          # Erstelle und pushe neuen Tag
          git tag -a "${{ env.TAG }}" -m "Release ${{ env.TAG }}"
          git push origin "${{ env.TAG }}"

            
