name: Build and Deploy CKSP Compiler

on:
  # push:
  #   branches:
  #     - master # Trigger on push to the main branch
  workflow_dispatch: # Allow manual triggering of the workflow

jobs:
  build-macos:
    runs-on: macos-latest
    outputs:
      version_dir: ${{ steps.extract-version-macos.outputs.version_dir }}
      tag: ${{ steps.extract-tag-macos.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v1
        with:
          cmake-version: '3.27.0'

      - name: Install dependencies
        run: brew install ninja || echo "Ninja is already installed"

      - name: Install Rosetta
        run: |
          sudo softwareupdate --install-rosetta --agree-to-license || echo "Rosetta already installed"

      - name: Build CKSP for ARM64 (native)
        run: |
          export CI=true
          chmod +x build.sh
          chmod +x scripts/build_and_package.sh
          ./scripts/build_and_package.sh

      - name: Build CKSP for x86_64 (Rosetta)
        run: |
          export CI=true
          export ARCH_OVERRIDE=x86_64
          chmod +x build.sh
          chmod +x scripts/build_and_package.sh
          arch -x86_64 ./scripts/build_and_package.sh

      - name: Verify architectures of macOS binaries
        run: |
          file _Releases/*/macos_*/cksp

      - name: Extract version directory (macOS)
        id: extract-version-macos
        run: |
            chmod +x scripts/extract_version_dir.sh
            VERSION_DIR=$(./scripts/extract_version_dir.sh)
            echo "version_dir=$VERSION_DIR" >> $GITHUB_OUTPUT
            echo "Detected VERSION_DIR: $VERSION_DIR"
            ls _Releases/

      - name: Extract version and set tag
        id: extract-tag-macos
        run: |
            VERSION=$(cmake-build-release/cksp --version | awk '{print $3}')
            TAG="v${VERSION}"
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "Detected TAG: $TAG"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: _Releases/${{ steps.extract-version-macos.outputs.version_dir }} # Upload release files for macOS

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check and install dependencies
        shell: pwsh
        run: |
          choco upgrade chocolatey
      
          if (-not (Get-Command cmake -ErrorAction SilentlyContinue)) {
            choco install cmake --version=3.27.0 --force
          } else {
            Write-Host "CMake already installed"
            cmake --version
          }
      
          if (-not (Get-Command ninja -ErrorAction SilentlyContinue)) {
            choco install ninja
          } else {
            Write-Host "Ninja already installed"
            ninja --version
          }

      - name: Build CKSP (Windows)
        run: |
            cmd /c build.bat

      - name: Extract version directory (Windows)
        id: extract-version-windows
        shell: cmd
        run: |
            for /f "delims=" %%a in ('call scripts\extract_version_dir.bat') do echo VERSION_DIR=%%a >> %GITHUB_ENV%
            
            rem Output of the extracted VERSION_DIR
            echo Extracted VERSION_DIR:
            for /f "delims=" %%a in ('call scripts\extract_version_dir.bat') do echo %%a
            
            rem Show contents of the _Releases folder
            echo Current _Releases folder content:
            dir _Releases /s
    

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: _Releases/${{ env.VERSION_DIR }} # Upload release files for Windows

  deploy:
    runs-on: ubuntu-latest
    needs: [build-macos, build-windows]
    environment: cksp-compiler-issues
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # important for pushing tags and commits
          submodules : recursive
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: Check if VERSION_DIR is set
        if: ${{ needs.build-macos.outputs.version_dir == '' || needs.build-macos.outputs.version_dir == null }}
        run: |
          echo "Error: VERSION_DIR is not set. Aborting workflow."
          exit 1

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: windows-release/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-build
          path: macos-release/

      - name: Merge artifacts into _Releases
        run: |
            ls windows-release/
            ls macos-release/
            # Ensure the target folder exists
            mkdir -p _Releases/${{ needs.build-macos.outputs.version_dir }}
            
            # Copy files from macos-release/
            rsync -a macos-release/ _Releases/${{ needs.build-macos.outputs.version_dir }}/
            
            # Copy files from windows-release/
            rsync -a windows-release/windows/ _Releases/${{ needs.build-macos.outputs.version_dir }}/windows/

      - name: Fix permissions for macOS binary
        run: |
            find _Releases/${{ needs.build-macos.outputs.version_dir }} -type f ! -name "*.*" -exec chmod +x {} \;          

      # - name: Push merged _Releases to master
      #   env:
      #       GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #   run: |
      #       git config user.name "GitHub Actions"
      #       git config user.email "actions@github.com"
      #       git add _Releases/${{ needs.build-macos.outputs.version_dir }}
      #       git commit -m "Merge artifacts for version ${{ needs.build-macos.outputs.version_dir }}"
      #       git push origin master

      - name: Configure git author (for tagging)
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Publish changelog to submodule
        env:
          SUBMODULE_TOKEN: ${{ secrets.SUBMODULE_TOKEN }}
          TAG: ${{ needs.build-macos.outputs.tag }}
        run: |
          chmod +x scripts/publish_submodule_changelog.sh
          ./scripts/publish_submodule_changelog.sh

      - name: Copy renamed changelog to project changelogs directory
        env:
          TAG: ${{ needs.build-macos.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p changelogs
          cp CHANGELOG.md "changelogs/CHANGELOG-${TAG}.md"

      - name: Push to master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          git add CHANGELOG.md changelogs/
          # Only commit if there are staged changes
          if git diff --cached --quiet; then
            echo "Nothing to commit."
            DID_COMMIT=0
          else
            git commit -m "Publish Release: ${{ needs.build-macos.outputs.tag }}"
            DID_COMMIT=1
          fi

          # Set main repo remote to HTTPS + token (because persist-credentials: false)
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          
          # Determine current branch (robust for main/master/feature branches)
          BRANCH="${GITHUB_REF_NAME:-$(git rev-parse --abbrev-ref HEAD)}"
          echo "Pushing pointer commit to ${BRANCH}"

          # Rebase against remote (avoids non-fast-forward on parallel runs)
          git fetch origin "${BRANCH}"
          git pull --rebase origin "${BRANCH}" || true

          # Push is always safe: if nothing is new, exit code is still 0
          if [ "$DID_COMMIT" -eq 1 ]; then
            echo "Pushing new commit…"
          else
            echo "No new commit, but ensuring remote is up to date…"
          fi
          git push origin "HEAD:${BRANCH}"

      - name: Delete existing Git tag
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
            git fetch --tags
            TAG="${{ needs.build-macos.outputs.tag }}"
      
            if git tag -l | grep -qx "$TAG"; then
                git tag -d "$TAG"
                git push --delete origin "$TAG" || echo "Tag $TAG does not exist remotely, skipping deletion"
            else
                echo "Tag $TAG does not exist locally or remotely, skipping deletion"
            fi

      - name: Create and push Git tag
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
            git fetch --tags
            TAG="${{ needs.build-macos.outputs.tag }}"

            # Create and push new tag
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"

            
      - name: Zip version_dir folder
        run: |
            cd _Releases && zip -r ${{ needs.build-macos.outputs.version_dir }}.zip ${{ needs.build-macos.outputs.version_dir }} -x "*.DS_Store"
          

      - name: Delete GitHub release if it exists
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
            EXISTING_RELEASE=$(gh release view "${{ needs.build-macos.outputs.tag }}" --json url --jq .url || echo "")
            if [ -n "$EXISTING_RELEASE" ]; then
              echo "Deleting existing release ${{ needs.build-macos.outputs.tag }}"
              gh release delete "${{ needs.build-macos.outputs.tag }}" --yes
            fi
            
      - name: Create GitHub release
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
            IS_PRERELEASE="false"
            if [[ "${{ needs.build-macos.outputs.tag }}" == *-* ]]; then
            IS_PRERELEASE="true"
            fi
            CHANGELOG_PATH="CHANGELOG.md"
            if [ -f "$CHANGELOG_PATH" ]; then
              BODY=$(<"$CHANGELOG_PATH")
            else
              BODY="Automatically generated release for ${{ needs.build-macos.outputs.tag }}"
            fi
            gh release create "${{ needs.build-macos.outputs.tag }}" \
            _Releases/${{ needs.build-macos.outputs.version_dir }}.zip \
            --title "${{ needs.build-macos.outputs.tag }}" \
            --notes "$BODY" \
            --prerelease=$IS_PRERELEASE
